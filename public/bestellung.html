<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Bestellung erfassen</title>
    <style>
      body {
        font-size: 18px;
        line-height: 1.6;
        padding: 15px;
      }

      .product {
        display: flex;
        align-items: center;
        padding: 20px 0; /* Mehr Platz zum Klicken */
        border-bottom: 2px solid #ddd;
      }

      .product img {
        width: 80rem;
        height: 80rem;
      } /* Größere Bilder */

      input[type="number"] {
        width: 80px;
        height: 50px;
        font-size: 20px; /* Besser lesbar */
      }

      button {
        width: 100%;
        padding: 20px;
        font-size: 1.2em;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Bestellung</h1>
    <div id="product-list">Lädt...</div>
    <button onclick="submitOrder()">Bestellung senden</button>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      let code = urlParams.get("code");

      if (code) {
        localStorage.setItem("customerCode", code); // Code speichern
      } else {
        code = localStorage.getItem("customerCode"); // Code aus Speicher holen
      }

      // 2. Sicherheits-Check: Wenn kein Code da ist, Abbruch
      if (!code) {
        document.body.innerHTML =
          "<h1>Fehler: Kein Kunden-Zugang gefunden.</h1><p>Bitte scannen Sie den QR-Code in der Küche.</p>";
      } else {
        loadProducts(); // Wenn Code da ist, Produkte laden
      }

      async function loadProducts() {
        // Erst Validierung
        const val = await fetch(`/api/validate-customer?code=${code}`);
        if (!val.ok)
          return (document.body.innerHTML = "<h1>Zugriff verweigert!</h1>");

        const res = await fetch("/api/products");
        const products = await res.json();
        document.getElementById("product-list").innerHTML = products
          .map(
            (p) => `
                <div class="product">
                    ${p.image_url ? `<img src="${p.image_url}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 10px;">` : ""}
                    <span>${p.name} (${p.unit})</span>
                    <input type="number" id="qty-${p.id}" value="0" min="0">
                </div>
            `,
          )
          .join("");
      }

      async function submitOrder() {
        const inputs = document.querySelectorAll("input");
        const items = [];
        inputs.forEach((i) => {
          if (i.value > 0)
            items.push({
              product_id: i.id.replace("qty-", ""),
              quantity: i.value,
            });
        });

        const res = await fetch("/api/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ customer_code: code, items }),
        });
      }

      function logout() {
        localStorage.removeItem("customerCode");
        // Leite auf eine Seite um, die den QR-Code zeigt
        window.location.href = "login_info.html";
      }

      document.addEventListener("DOMContentLoaded", () => {
        loadProducts();
      });
    </script>
  </body>
</html>
